{% extends "base.html" %}

{% block content %}
<section class="card">
    <h1>Upgrade</h1>
    <p>Unlock the pro area and future premium features.</p>

    {% if user.is_pro %}
    <p class="success">You already have Pro.</p>
    {% else %}
    <button onclick="upgrade()">Go Pro</button>
    <p class="muted">You will only get Pro after Stripe confirms payment.</p>
    {% endif %}
</section>

<script>
function upgrade() {
    fetch('{{ url_for("create_checkout_session") }}', { method: 'POST' })
        .then(response => response.json())
        .then(data => {
            if (data.url) {
                window.location = data.url;
            } else if (data.error) {
                alert(data.error);
            }
        });
}
</script>
{% endblock %}
