{% extends "base.html" %}

{% block content %}
<section class="card" style="text-align: center;">
    <h1>429</h1>
    <h2>Too many requests</h2>

    <p>You’re doing that too often. Please wait a moment and try again.</p>

    <p style="opacity: 0.7;">This helps prevent spam and keeps things running smoothly.</p>

    <div style="margin-top: 20px;">
        <a href="{{ url_for('dashboard') if session.get('user_id') else url_for('login') }}">
            <button>Go back</button>
        </a>
    </div>
</section>
{% endblock %}
