{% extends "base.html" %}
{% block content %}
<section class="hero-card auth-card">
    <div class="eyebrow">Password reset</div>
    <h1>Reset your password</h1>
    <p class="lead">Enter your email and we’ll send you a reset link.</p>

    {% if error %}
        <div class="status-box status-bad">{{ error }}</div>
    {% endif %}
    {% if message %}
        <div class="status-box status-good">{{ message }}</div>
    {% endif %}

    <form method="POST" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="you@example.com" required>
        </label>

        <button class="btn btn-primary" type="submit">Send reset link</button>
    </form>

    <p class="form-foot">
        <a href="{{ url_for('login') }}">Back to login</a>
    </p>
</section>
{% endblock %}
