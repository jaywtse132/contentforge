{% extends "base.html" %}
{% block content %}
<section class="hero-card success-card">
    <div class="eyebrow">Payment complete</div>
    <h1>Nice. Stripe did its thing.</h1>
    <p class="lead">Your checkout finished successfully. The webhook handles the actual upgrade in the background, and your dashboard should reflect Pro once that lands.</p>

    <div class="hero-actions">
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Back to Dashboard</a>
        <a href="{{ url_for('pro') }}" class="btn btn-secondary">Try Pro Area</a>
    </div>
</section>
{% endblock %}
