<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ContentForge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body>
    <div class="site-shell">
        <header class="topbar">
            <div class="brand-wrap">
                <a class="brand" href="{{ url_for('dashboard') if user else url_for('login') }}">
                    <span class="brand-mark">CF</span>
                    <span class="brand-text">
                        <strong>ContentForge</strong>
                        <span>Build, ship, upgrade</span>
                    </span>
                </a>
            </div>

            <nav class="topnav">
                {% if user %}
                    <a href="{{ url_for('dashboard') }}">Dashboard</a>
                    <a href="{{ url_for('upgrade') }}">Upgrade</a>
                    <a href="{{ url_for('pro') }}">Pro Area</a>
                    <a href="{{ url_for('logout') }}" class="ghost-link">Logout</a>
                {% else %}
                    <a href="{{ url_for('login') }}">Login</a>
                    <a href="{{ url_for('signup') }}">Sign up</a>
                {% endif %}
            </nav>
        </header>

        <main class="page-wrap">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script>
        window.ContentForge = window.ContentForge || {};
        window.ContentForge.csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';

        window.ContentForge.post = async function (url, options = {}) {
            const headers = new Headers(options.headers || {});
            headers.set('X-CSRFToken', window.ContentForge.csrfToken);

            return fetch(url, {
                method: options.method || 'POST',
                credentials: 'same-origin',
                ...options,
                headers,
            });
        };
    </script>
</body>
</html>
