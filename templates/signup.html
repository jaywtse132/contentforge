{% extends "base.html" %}
{% block content %}
<section class="hero-card auth-card">
    <div class="eyebrow">Create account</div>
    <h1>Start with a clean workspace</h1>
    <p class="lead">Make your account, get into the dashboard, and unlock Pro whenever you’re ready.</p>

    {% if error %}
        <div class="status-box status-bad">{{ error }}</div>
    {% endif %}

    <form method="POST" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="you@example.com" required>
        </label>

        <label>
            <span>Password</span>
            <input type="password" name="password" placeholder="At least 12 characters" required>
        </label>

        <button class="btn btn-primary" type="submit">Create account</button>
    </form>

    <p class="form-foot">
        Already have an account?
        <a href="{{ url_for('login') }}">Log in</a>
    </p>
</section>
{% endblock %}
