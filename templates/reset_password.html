{% extends "base.html" %}
{% block content %}
<section class="hero-card auth-card">
    <div class="eyebrow">New password</div>
    <h1>Set a new password</h1>
    <p class="lead">Choose a strong password with at least 12 characters.</p>

    {% if error %}
        <div class="status-box status-bad">{{ error }}</div>
    {% endif %}
    {% if message %}
        <div class="status-box status-good">{{ message }}</div>
    {% endif %}

    <form method="POST" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label>
            <span>New password</span>
            <input type="password" name="password" placeholder="At least 12 characters" required minlength="12">
        </label>

        <button class="btn btn-primary" type="submit">Update password</button>
    </form>
</section>
{% endblock %}
