{% extends "base.html" %}

{% block content %}
<section class="card">
    <h1>Admin Panel</h1>
    <p class="muted">Manage users, plans, and roles.</p>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Pro</th>
                    <th>Admin</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for row in users %}
                <tr>
                    <td>{{ row.id }}</td>
                    <td>{{ row.email }}</td>
                    <td>{{ "Yes" if row.is_pro else "No" }}</td>
                    <td>{{ "Yes" if row.is_admin else "No" }}</td>
                    <td class="actions">
                        <form method="POST" action="{{ url_for('toggle_pro', user_id=row.id) }}">
                            <button type="submit">Toggle Pro</button>
                        </form>

                        <form method="POST" action="{{ url_for('toggle_admin', user_id=row.id) }}">
                            <button type="submit" {% if row.id == user.id %}disabled{% endif %}>Toggle Admin</button>
                        </form>

                        <form method="POST" action="{{ url_for('delete_user', user_id=row.id) }}">
                            <button type="submit" class="danger" {% if row.id == user.id %}disabled{% endif %}>Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
